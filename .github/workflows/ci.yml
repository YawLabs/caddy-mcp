name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Check for repo drift after install and build
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Repo has uncommitted changes after install+build:"
            git status --porcelain
            git diff
            exit 1
          fi

  integration:
    runs-on: ubuntu-latest
    env:
      CADDY_VERSION: 2.10.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Caddy
        run: |
          curl -sSL "https://github.com/caddyserver/caddy/releases/download/v${CADDY_VERSION}/caddy_${CADDY_VERSION}_linux_amd64.tar.gz" \
            | tar xz caddy
          sudo mv caddy /usr/local/bin/caddy
          caddy version

      - name: Start Caddy (admin API on localhost:2019)
        run: |
          caddy start
          for i in $(seq 1 30); do
            if curl -sf http://localhost:2019/config/ > /dev/null; then
              echo "Caddy ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Caddy did not start in time"
          caddy stop || true
          exit 1

      - run: npm ci
      - run: npm run build

      - name: Run integration tests
        env:
          CADDY_MCP_INTEGRATION: "1"
          CADDY_ADMIN_URL: http://localhost:2019
        run: npm test

      - name: Stop Caddy
        if: always()
        run: caddy stop || true
